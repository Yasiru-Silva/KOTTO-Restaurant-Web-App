spring.application.name=kotto-backend

server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/kotto?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kotto_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:StrongPass123!}

spring.jpa.hibernate.ddl-auto=update

# JWT (must be 32+ chars)
app.jwt.secret=${APP_JWT_SECRET:KOTTO_SUPER_SECRET_KEY_1234567890_ABCDEF!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Frontend URL for reset password link
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Email Configuration (Gmail SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

logging.level.org.springframework.security=DEBUG
logging.level.com.kotto.be=DEBUG

# File uploads (images stored under project working directory)
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB